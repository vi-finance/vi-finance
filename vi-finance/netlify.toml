[build]
  publish = "."
  command = ""

# SPA routing — tutte le rotte vanno a index.html
[[redirects]]
  from = "/blog/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200

# Admin CMS
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Headers sicurezza
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
